name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/deploy-frontend.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Build & Deploy Next.js
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::868899309401:role/ctech-account-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Set environment
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH" = "main" ]; then
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_URL=https://accounts-api.arturocarvalho.com" >> $GITHUB_ENV
          elif [ "$BRANCH" = "stage" ]; then
            echo "ENVIRONMENT=stage" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_URL=https://accounts-api-stage.arturocarvalho.com" >> $GITHUB_ENV   
          else
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_URL=https://accounts-api-dev.arturocarvalho.com" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}

      - name: Read S3 bucket name
        run: |
          BUCKET="${ENVIRONMENT}-ctech-account-frontend"
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name "CtechAccount-$(echo $ENVIRONMENT | sed 's/./\u&/')-Frontend" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text 2>/dev/null || echo "")
          echo "S3_BUCKET=$BUCKET" >> $GITHUB_ENV
          echo "DISTRIBUTION_ID=$DIST_ID" >> $GITHUB_ENV

      - name: Deploy to S3
        run: |
          aws s3 sync out/ "s3://$S3_BUCKET/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html" \
            --exclude "*.json"

          # HTML files: no cache
          aws s3 sync out/ "s3://$S3_BUCKET/" \
            --delete \
            --cache-control "no-cache,no-store,must-revalidate" \
            --include "*.html" \
            --include "*.json"

      - name: Invalidate CloudFront
        if: env.DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"
