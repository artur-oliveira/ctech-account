name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/deploy-backend.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Build & Deploy Go Binary
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::868899309401:role/ctech-account-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Set environment
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH" = "main" ]; then
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
          elif [ "$BRANCH" = "staging" ]; then
            echo "ENVIRONMENT=stage" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
          fi

      - name: Build arm64 binary
        run: GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o bootstrap ./cmd/api

      - name: Package
        run: zip -j release.zip bootstrap

      - name: Read deployment config from SSM
        run: |
          BUCKET=$(aws ssm get-parameter --name "/ctech/$ENVIRONMENT/s3/deployments-bucket" --query Parameter.Value --output text 2>/dev/null || echo "${ENVIRONMENT}-ctech-deployments")
          ASG_NAME="${ENVIRONMENT}-ctech-account"
          echo "DEPLOYMENTS_BUCKET=$BUCKET" >> $GITHUB_ENV
          echo "ASG_NAME=$ASG_NAME" >> $GITHUB_ENV

      - name: Upload artifact to S3
        run: |
          aws s3 cp release.zip "s3://$DEPLOYMENTS_BUCKET/ctech-account/current.zip"
          aws s3 cp release.zip "s3://$DEPLOYMENTS_BUCKET/ctech-account/$(date +%Y%m%d_%H%M%S).zip"

      - name: Rolling deploy via SSM
        run: |
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG_NAME" \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
            --output text | tr '\t' ',')

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No running instances found in ASG $ASG_NAME"
            exit 0
          fi

          echo "Deploying to instances: $INSTANCE_IDS"

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceids,Values=$INSTANCE_IDS" \
            --parameters "commands=['/opt/app/deploy.sh ctech-account/current.zip']" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for all instances to complete
          for INSTANCE_ID in $(echo $INSTANCE_IDS | tr ',' ' '); do
            echo "Waiting for $INSTANCE_ID..."
            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID"

            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text)

            if [ "$STATUS" != "Success" ]; then
              echo "Deploy failed on $INSTANCE_ID (status: $STATUS)"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            echo "✓ $INSTANCE_ID deployed successfully"
          done
